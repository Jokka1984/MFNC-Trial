```
<img id="logo" src="logo.png" alt="Club Logo">

<h1>Weekly Members Draw</h1>
<h1>Jackpot $250</h1>

<div id="display">Loading...</div>

<button id="start" disabled>Start Members Draw</button>

<script>
    let participants = [];

    const display = document.getElementById('display');
    const startBtn = document.getElementById('start');

    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQhbyJ2fksThS4Hv7c2f0ckZ0L2L7GyXjvYJ7DqKKEjeUl7ES7TSXWw9y-VyhMIpIRvCsCCfL9QD1fV/pub?gid=1606765783&single=true&output=csv";

    async function loadParticipants() {
        try {
            const response = await fetch(CSV_URL);
            const csvText = await response.text();

            const results = Papa.parse(csvText, {
                header: true,
                skipEmptyLines: true
            });

            participants = results.data.filter(row => row.Number && row.Name);

            if (participants.length > 0) {
                startBtn.disabled = false;
                display.textContent = "?";
            } else {
                display.textContent = "No valid data!";
            }

        } catch (error) {
            console.error(error);
            display.textContent = "Error loading data";
        }
    }

    loadParticipants();

    let intervalId = null;

    function shuffleAnimation() {
        let count = 0;
        const maxCycles = 100;

        intervalId = setInterval(() => {
            const randomEntry = participants[Math.floor(Math.random() * participants.length)];
            display.textContent = `${randomEntry.Number} - ${randomEntry.Name}`;
            display.style.color = "#e12826";

            count++;

            if (count >= maxCycles) {
                clearInterval(intervalId);

                const winner = participants[Math.floor(Math.random() * participants.length)];
                display.textContent = `🎉 ${winner.Number} - ${winner.Name} 🎉`;
                display.style.color = "#fece02";

                startBtn.disabled = false;
            }

        }, 50);
    }

    startBtn.addEventListener('click', () => {
        startBtn.disabled = true;
        shuffleAnimation();
    });
</script>
